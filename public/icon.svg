<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="64" y1="64" x2="448" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F766E"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="shine" x1="120" y1="96" x2="392" y2="416" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="0.55" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Rounded-square background -->
  <rect x="48" y="48" width="416" height="416" rx="104" fill="url(#bg)"/>
  <path d="M120 112c78-38 178-34 252 14 18 12 32 26 44 42-16-74-82-132-164-132H184c-72 0-132 48-154 116 26-16 56-30 90-40Z" fill="url(#shine)"/>

  <!-- Monogram: R + key silhouette -->
  <g filter="url(#shadow)" fill="none" stroke="#FFFFFF" stroke-linecap="round" stroke-linejoin="round">
    <!-- R stem and bowl -->
    <path d="M188 356V164h112c44 0 76 30 76 68s-32 68-76 68H188" stroke-width="44"/>
    <!-- R leg -->
    <path d="M244 280l132 152" stroke-width="44"/>

    <!-- Key: head + shaft + teeth (integrated near lower-left) -->
    <circle cx="194" cy="328" r="34" stroke-width="28"/>
    <path d="M226 328h92" stroke-width="28"/>
    <path d="M300 328v26m28-26v18m28-18v30" stroke-width="18"/>
  </g>
</svg>
